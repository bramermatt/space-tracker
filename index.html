<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTEMIS II // Mission Control Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="crt-overlay" aria-hidden="true"></div>

  <div class="console" role="application" aria-label="Artemis II mission control dashboard">
    <header class="top-bar panel">
      <div class="top-block">
        <span class="label">MISSION</span>
        <span class="value mission-name">ARTEMIS II</span>
      </div>

      <div class="top-block">
        <span class="label">MISSION ELAPSED TIME</span>
        <span class="value" id="mission-time">T+00:00:00</span>
      </div>

      <div class="top-block">
        <span class="label">SYSTEM STATUS</span>
        <span class="value status" id="system-status">NOMINAL</span>
      </div>

      <div class="cursor-wrap" aria-hidden="true">
        <span>CONSOLE LINK</span>
        <span class="cursor"></span>
      </div>
    </header>

    <aside class="left-panel panel">
      <h2>MISSION TIMELINE</h2>
      <ol id="timeline-list" class="timeline"></ol>
    </aside>

    <main class="center-panel panel">
      <h2>LIVE TELEMETRY</h2>
      <div class="telemetry-grid">
        <div class="metric">
          <span class="metric-label">VELOCITY</span>
          <span class="metric-value" id="velocity">0</span>
          <span class="metric-unit">mph</span>
        </div>

        <div class="metric">
          <span class="metric-label">DISTANCE FROM EARTH</span>
          <span class="metric-value" id="distance">0</span>
          <span class="metric-unit">mi</span>
        </div>

        <div class="metric">
          <span class="metric-label">ALTITUDE</span>
          <span class="metric-value" id="altitude">0</span>
          <span class="metric-unit">mi</span>
        </div>

        <div class="metric">
          <span class="metric-label">COMMUNICATION</span>
          <span class="metric-value" id="comms">LOCKED</span>
          <span class="metric-unit">deep space network</span>
        </div>
      </div>
    </main>

    <aside class="right-panel panel">
      <h2>EVENT LOG</h2>
      <div class="event-log" id="event-log" aria-live="polite"></div>
    </aside>

    <section class="bottom-panel panel">
      <h2>SYSTEMS STATUS GRID</h2>
      <div class="systems-grid" id="systems-grid"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
